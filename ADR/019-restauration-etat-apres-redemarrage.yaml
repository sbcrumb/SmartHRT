id: 019
title: "Restauration complète de l'état de la machine à états après redémarrage"
status: "Accepté"
date: "2026-02-02"
context: |
  Lorsque Home Assistant redémarre, SmartHRT restaure l'état de la machine à états
  depuis le stockage persistant (ADR-004, ADR-009). Cependant, la restauration était
  incomplète : seuls les coefficients thermiques et l'état lui-même étaient restaurés,
  mais pas les triggers temporels ni les tâches périodiques associées à chaque état.

  Problèmes identifiés :

  **État DETECTING_LAG (État 2) :**
  - La surveillance de température était active (via _periodic_update) ✅
  - Pas de trigger spécifique à reprogrammer ✅

  **État MONITORING (État 3) :**
  - Les mises à jour périodiques de recovery_start_hour étaient perdues ❌
  - Le trigger recovery_update_hour n'était pas reprogrammé ❌
  - Le trigger recovery_start_hour n'était pas reprogrammé ❌
  - Impact : L'instance restait en mode "veille" sans mettre à jour les calculs

  **État RECOVERY (État 4) :**
  - État transitoire très court (quelques secondes) ❌
  - Si HA redémarre pendant ces secondes, l'instance reste bloquée en RECOVERY
  - Pas de mécanisme pour passer automatiquement à HEATING_PROCESS

  **État HEATING_PROCESS (État 5) :**
  - La surveillance de TSP était active (via _check_temperature_thresholds) ✅
  - Mais si target_hour était dépassée pendant le redémarrage, on_recovery_end() 
    n'était jamais appelé ❌
  - Impact : RPth n'était pas calculé si le réveil avait lieu pendant le redémarrage

  **État HEATING_ON (État 1) :**
  - Aucun trigger spécifique à restaurer ✅

  Exemple de scénario problématique :
  1. SmartHRT passe en état MONITORING à 23h00 (recoverycalc_hour)
  2. Home Assistant redémarre à 01h00
  3. Au redémarrage, l'état MONITORING est restauré
  4. Mais recovery_update_hour n'est jamais reprogrammé
  5. L'heure de relance n'est plus mise à jour dynamiquement
  6. La relance démarre avec un calcul obsolète ou ne démarre jamais

decision: |
  Création d'une méthode dédiée `_restore_state_after_restart()` appelée à la fin
  de `async_setup()` qui analyse l'état courant et reprogramme tous les triggers
  et tâches périodiques nécessaires.

  **AMÉLIORATION MAJEURE - Vérification de cohérence horaire :**
  Avant de restaurer les triggers, la méthode vérifie que l'état persisté est
  cohérent avec l'heure actuelle via `_determine_expected_state_for_time()`.
  Si l'état n'est pas cohérent (ex: état MONITORING persisté mais il est 10h
  du matin), l'état est automatiquement corrigé via `_transition_to_expected_state()`.

  **Méthode _determine_expected_state_for_time() :**
  Détermine l'état attendu basé sur l'heure actuelle par rapport aux heures
  configurées (target_hour, recoverycalc_hour, recovery_start_hour):
  - target_hour → recoverycalc_hour : HEATING_ON (jour)
  - recoverycalc_hour → recovery_start_hour : MONITORING (nuit)
  - recovery_start_hour → target_hour : HEATING_PROCESS (relance)

  **Méthode _transition_to_expected_state() :**
  Force la transition vers l'état attendu en configurant correctement tous les
  modes (recovery_calc_mode, rp_calc_mode, temp_lag_detection_active) et en
  initialisant les valeurs de référence si nécessaires.

  **Implémentation par état :**

  1. **DETECTING_LAG** : Rien de spécial, la surveillance est déjà active

  2. **MONITORING** :
     - Reprogrammer recovery_update_hour si non dépassé
     - Si dépassé, appeler immédiatement _async_on_recovery_update_hour()
     - Reprogrammer recovery_start_hour si non dépassé
     - Si dépassé, appeler immédiatement on_recovery_start()

  3. **RECOVERY** (état transitoire) :
     - Passer directement à HEATING_PROCESS
     - Activer rp_calc_mode
     - Sauvegarder l'état

  4. **HEATING_PROCESS** :
     - Vérifier si target_hour est dépassée
     - Si oui, appeler immédiatement on_recovery_end()
     - Sinon, la surveillance automatique prend le relais

  5. **HEATING_ON** : Rien de spécial

  6. **État inconnu** : Log warning et réinitialisation à HEATING_ON

  **Logs ajoutés :**
  - INFO au début : "Restauration après redémarrage - État persisté: {state}, État attendu (heure): {expected}"
  - WARNING si incohérence : "État incohérent détecté - Correction: {old} → {new}"
  - DEBUG pour chaque trigger reprogrammé
  - INFO pour les actions correctives (trigger dépassé, transition forcée)

consequences:
  positive:
    - Reprise complète et cohérente après redémarrage dans tous les états
    - Les calculs dynamiques (RCth, recovery_update) reprennent automatiquement
    - Les triggers temporels manqués pendant le redémarrage sont gérés (déclenchement immédiat)
    - La machine à états ne reste jamais bloquée dans un état incohérent
    - Meilleure résilience face aux redémarrages fréquents (mises à jour HA, coupures)
    - Logs détaillés pour diagnostiquer les problèmes de restauration
  negative:
    - Complexité accrue du code de setup (méthode supplémentaire ~120 lignes)
    - Nécessite une compréhension approfondie de la machine à états pour maintenance
    - Risque de comportement inattendu si les timestamps persistés sont incohérents
  mitigation:
    - Documentation extensive dans les commentaires du code
    - Logs INFO/DEBUG pour chaque décision de restauration
    - Tests manuels sur tous les états avant release
    - ADR détaillant le comportement attendu pour chaque état

