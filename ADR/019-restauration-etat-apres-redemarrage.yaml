implementation_details: |
  **Méthode _restore_state_after_restart() :**
  ```python
  async def _restore_state_after_restart(self) -> None:
      current_state = self.data.current_state
      now = dt_util.now()
      
      _LOGGER.info("%s Restauration après redémarrage - État: %s", 
                   self._log_prefix(), current_state)
      
      # Logique spécifique par état...
  ```

  **Appel dans async_setup() :**
  ```python
  async def async_setup(self) -> None:
      # ... code existant ...
      
      # Restaurer les triggers et tâches périodiques selon l'état de la machine
      await self._restore_state_after_restart()
  ```

  **Gestion des triggers dépassés :**
  - Si recovery_update_hour est dans le passé → recalcul immédiat
  - Si recovery_start_hour est dans le passé → démarrage immédiat de la relance
  - Si target_hour est dans le passé en mode HEATING_PROCESS → fin de relance immédiate

test_scenarios:
  - scenario: "Redémarrage pendant MONITORING avant recovery_start_hour"
    expected: "Triggers recovery_update_hour et recovery_start_hour reprogrammés"
  - scenario: "Redémarrage pendant MONITORING après recovery_start_hour"
    expected: "on_recovery_start() appelé immédiatement"
  - scenario: "Redémarrage pendant RECOVERY"
    expected: "Transition automatique vers HEATING_PROCESS"
  - scenario: "Redémarrage pendant HEATING_PROCESS avant target_hour"
    expected: "Surveillance TSP continue normalement"
  - scenario: "Redémarrage pendant HEATING_PROCESS après target_hour"
    expected: "on_recovery_end() appelé immédiatement"
  - scenario: "Redémarrage avec état corrompu"
    expected: "Warning logué et réinitialisation à HEATING_ON"
  - scenario: "État MONITORING persisté mais il est 10h du matin"
    expected: "Correction automatique vers HEATING_ON, warning logué"
  - scenario: "État HEATING_ON persisté mais il est 2h du matin"
    expected: "Correction automatique vers MONITORING, calculs RCth démarrés"
  - scenario: "État HEATING_ON persisté mais il est 5h30 (après recovery_start)"
    expected: "Correction automatique vers HEATING_PROCESS, rp_calc_mode activé"

examples: |
  **Logs lors d'une restauration en état MONITORING (cohérent) :**
  ```
  [Salon#a1b2c3d4] Restauration après redémarrage - État persisté: monitoring, État attendu (heure): monitoring
  [Salon#a1b2c3d4] Trigger recovery_update_hour reprogrammé: 2026-02-03 02:30:00
  [Salon#a1b2c3d4] Trigger recovery_start reprogrammé: 2026-02-03 04:15:00
  ```

  **Logs lors d'une restauration avec état incohérent :**
  ```
  [Chambre#e5f6g7h8] Restauration après redémarrage - État persisté: monitoring, État attendu (heure): heating_on
  [Chambre#e5f6g7h8] État incohérent détecté - Correction: monitoring → heating_on
  [Chambre#e5f6g7h8] Transition forcée vers l'état heating_on
  [Chambre#e5f6g7h8] État HEATING_ON initialisé - Mode journée
  ```

  **Logs lors d'une restauration avec trigger dépassé :**
  ```
  [Chambre#e5f6g7h8] Restauration après redémarrage - État persisté: monitoring, État attendu (heure): monitoring
  [Chambre#e5f6g7h8] Trigger recovery_update_hour dépassé, recalcul immédiat
  [Chambre#e5f6g7h8] Recovery time: 2026-02-03 04:45:00 (1.50h avant target)
  [Chambre#e5f6g7h8] Prochaine mise à jour programmée: 2026-02-03 03:30:00
  ```

  **Logs lors d'une restauration en état RECOVERY (rare) :**
  ```
  [Bureau#f7g8h9i0] Restauration après redémarrage - État persisté: recovery, État attendu (heure): heating_process
  [Bureau#f7g8h9i0] État RECOVERY restauré pendant redémarrage - Passage à HEATING_PROCESS
  [Bureau#f7g8h9i0] Données apprises et état sauvegardés en stockage
  ```
