  async def async_options_updated(hass: HomeAssistant, entry: ConfigEntry) -> None:
      """AppelÃĐ quand les options sont modifiÃĐes via l'UI."""
      coordinator = hass.data[DOMAIN][entry.entry_id][DATA_COORDINATOR]
      
      try:
          # ADR-045: Validation Pydantic avant application
          validated = ConfigFlowDataModel(
              name=entry.data.get(CONF_NAME, "SmartHRT"),
              target_hour=entry.options.get(CONF_TARGET_HOUR, "06:00:00"),
              recoverycalc_hour=entry.options.get(CONF_RECOVERYCALC_HOUR, "23:00:00"),
              tsp=entry.options.get(CONF_TSP, DEFAULT_TSP),
              sensor_interior_temperature=entry.data.get(CONF_SENSOR_INTERIOR_TEMP),
              weather_entity=entry.data.get(CONF_WEATHER_ENTITY),
