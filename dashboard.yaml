- type: sections
  max_columns: 3
  title: SmartHRT salon
  path: smarthrtsalon
  icon: mdi:radiator
  sections:
    - type: grid
      cards:
        - type: heading
          heading_style: title
          badges:
            - type: entity
              show_state: true
              show_icon: true
              entity: switch.smarthrt_mode_chauffage_intelligent
              tap_action:
                action: toggle
          icon: mdi:power
          heading: CONFIGURATION
        - type: custom:bubble-card
          sub_button:
            main:
              - entity: sensor.smarthrt_temperature_interieure
                show_name: false
                show_state: true
                show_attribute: false
                show_icon: false
                show_background: false
                scrolling_effect: true
                content_layout: icon-left
                attribute: friendly_name
            bottom: []
          card_type: separator
          icon: mdi:home-thermometer-outline
          card_layout: large
          name: Température intérieure
          styles: |-
            * { 
              font-size: 12px !important;
            }
        - type: custom:bubble-card
          sub_button:
            main:
              - show_name: true
                show_state: true
                name: ""
                show_icon: true
                state_background: true
                entity: time.smarthrt_heure_coupure_chauffage
                show_attribute: false
                show_last_updated: true
                show_last_changed: false
            bottom: []
          card_type: separator
          icon: mdi:radiator-off
          card_layout: large
          name: Coupure chauffage
          styles: |-
            * { 
              font-size: 12px !important;
            }
        - type: custom:bubble-card
          sub_button:
            main:
              - show_name: false
                show_state: true
                show_attribute: false
                show_icon: true
                entity: time.smarthrt_heure_cible
                content_layout: icon-left
              - show_name: true
                show_state: true
                name: ""
                show_icon: true
                state_background: true
                entity: number.smarthrt_consigne
                show_attribute: false
                content_layout: icon-left
            bottom: []
          card_type: separator
          icon: mdi:clock-end
          card_layout: large-2-rows
          name: Heure cible et consigne
          styles: |-
            * { 
              font-size: 12px !important;
            }
          rows: 0.925
        - type: custom:bubble-card
          card_type: button
          entity: switch.smarthrt_mode_adaptatif
          card_layout: large-2-rows
          show_state: true
          force_icon: true
          sub_button:
            main:
              - entity: sensor.smarthrt_rcth
                show_state: true
                show_name: true
                name: RCth
                visibility:
                  - condition: state
                    entity: switch.smarthrt_mode_adaptatif
                    state: "on"
              - entity: sensor.smarthrt_rpth
                show_state: true
                show_name: true
                name: RPth
                visibility:
                  - condition: state
                    entity: switch.smarthrt_mode_adaptatif
                    state: "on"
              - entity: number.smarthrt_facteur_de_relaxation
                show_name: true
                show_state: true
                visibility:
                  - condition: state
                    entity: switch.smarthrt_mode_adaptatif
                    state: "on"
                name: Relaxation
            bottom: []
          name: Mode adaptatif
          tap_action:
            action: toggle
          button_type: switch
        - type: tile
          grid_options:
            columns: 3
            rows: 2
          visibility:
            - condition: state
              entity: switch.smarthrt_mode_adaptatif
              state: "off"
          entity: number.smarthrt_rcth_vent_faible
          name: RCth vent faible
          color: blue
          vertical: true
          features_position: bottom
        - type: tile
          grid_options:
            columns: 3
            rows: 2
          visibility:
            - condition: state
              entity: switch.smarthrt_mode_adaptatif
              state: "off"
          entity: number.smarthrt_rcth_vent_fort
          name: RCth vent fort
          color: red
          vertical: true
          features_position: bottom
        - type: tile
          grid_options:
            columns: 3
            rows: 2
          visibility:
            - condition: state
              entity: switch.smarthrt_mode_adaptatif
              state: "off"
          entity: number.smarthrt_rpth_vent_faible
          name: RPth vent faible
          color: blue
          vertical: true
          features_position: bottom
        - type: tile
          grid_options:
            columns: 3
            rows: 2
          visibility:
            - condition: state
              entity: switch.smarthrt_mode_adaptatif
              state: "off"
          entity: number.smarthrt_rpth_vent_fort
          name: RPth vent fort
          color: red
          vertical: true
          features_position: bottom
        - type: custom:bubble-card
          card_type: separator
          icon: mdi:information-outline
          card_layout: large
          name: Ajustez manuellement si mode adaptatif désactivé
          visibility:
            - condition: state
              entity: switch.smarthrt_mode_adaptatif
              state: "off"
          styles: |-
            * { 
              font-weight: normal !important;
              font-size: 11px !important;
            }
    - type: grid
      cards:
        - type: heading
          heading_style: title
          icon: mdi:chart-line
          heading: ÉTAT DU SYSTÈME
        - type: custom:bubble-card
          card_type: button
          entity: sensor.smarthrt_etat_machine
          card_layout: large
          show_state: false
          show_attribute: true
          attribute: state_label
          name: État actuel
          icon: mdi:state-machine
          button_type: state
          sub_button:
            main: []
            bottom: []
          rows: 1
          event_action:
            tap_action:
              action: more-info
            double_tap_action:
              action: none
            hold_action:
              action: none
          show_last_updated: false
        - type: custom:bubble-card
          sub_button:
            main:
              - show_name: true
                show_state: true
                name: Heure de relance
                show_icon: true
                state_background: true
                entity: sensor.smarthrt_heure_de_relance
              - entity: sensor.smarthrt_temps_avant_relance
                show_name: true
                show_state: true
                name: Temps restant
            bottom: []
          card_type: separator
          icon: mdi:clock-start
          card_layout: large-2-rows
          name: Relance programmée
          rows: 0.925
          styles: |-
            * { 
              font-size: 12px !important;
            }
        - type: custom:bubble-card
          sub_button:
            main:
              - entity: sensor.smarthrt_prevision_vent
                name: Prévision vent
                show_name: true
                show_state: true
              - entity: sensor.smarthrt_vent_moyen_4h
                name: Vent moyen 4h
                show_name: true
                show_state: true
              - entity: sensor.smarthrt_prevision_temperature
                name: Température prévue
                show_state: true
                show_name: true
            bottom: []
          card_type: separator
          icon: mdi:weather-partly-cloudy
          card_layout: large-2-rows
          name: Météo et prévisions
          grid_options:
            columns: full
            rows: 2
          styles: |-
            * { 
              font-size: 12px !important;
            }
      column_span: 1
    - type: grid
      cards:
        - type: heading
          heading_style: title
          icon: mdi:brain
          heading: PARAMÈTRES AVANCÉS
        - type: custom:bubble-card
          sub_button:
            main:
              - show_name: true
                show_state: true
                show_attribute: false
                show_icon: true
                entity: sensor.smarthrt_rcth
                name: RCth
              - show_name: true
                show_state: true
                name: RPth
                show_icon: true
                state_background: true
                entity: sensor.smarthrt_rpth
                show_attribute: false
            bottom: []
          card_type: separator
          icon: mdi:thermometer-lines
          card_layout: large-sub-buttons-grid
          name: Coefficients thermiques
          rows: 0.8
          styles: |-
            * { 
              font-size: 12px !important;
            }
        - type: custom:bubble-card
          sub_button:
            main:
              - entity: sensor.smarthrt_mode_calcul_relance
                show_name: true
                show_state: true
                name: Mode calc relance
              - entity: sensor.smarthrt_mode_calcul_rp
                show_name: true
                show_state: true
                name: Mode calc RP
            bottom: []
          card_type: separator
          icon: mdi:calculator-variant
          card_layout: large-2-rows
          name: Modes de calcul
          rows: 0.925
          styles: |-
            * { 
              font-size: 12px !important;
            }
        - type: custom:bubble-card
          sub_button:
            main:
              - entity: sensor.smarthrt_duree_lag_arret
                show_name: true
                show_state: true
                name: Lag arrêt
            bottom: []
          card_type: separator
          icon: mdi:timer-outline
          card_layout: large
          name: Détection lag température
          styles: |-
            * { 
              font-size: 12px !important;
            }
      column_span: 1
    - type: grid
      cards:
        - type: heading
          heading: Graphiques avancés
          heading_style: title
          icon: mdi:chart-multiple
        - type: custom:mini-graph-card
          height: 100
          decimals: 1
          hour24: true
          lower_bound_secondary: 0
          upper_bound_secondary: 1
          entities:
            - entity: sensor.smarthrt_temperature_interieure
              name: Température intérieure
              show_points: false
            - entity: number.smarthrt_consigne
              name: Consigne
              color: "#FFC107"
              show_fill: false
              show_line: true
              line_width: 2
              show_points: false
            - entity: sensor.smarthrt_etat_nuit
              color: "#424242"
              aggregate_func: Max
              show_state: false
              smoothing: false
              show_line: false
              show_points: false
              show_legend: false
              y_axis: secondary
          color_thresholds:
            - value: 30
              color: "#d50000"
            - value: 25
              color: "#f44336"
            - value: 22
              color: "#ff9800"
            - value: 20
              color: "#ffb74d"
            - value: 18
              color: "#4dd0e1"
            - value: 15
              color: "#29b6f6"
            - value: 10
              color: "#0288d1"
            - value: 5
              color: "#01579b"
          line_width: 2
          name: Températures intérieures
          hours_to_show: 48
          points_per_hour: 12
          group_by: hour
          show:
            icon: true
            name: true
            fill: fade
            labels: true
            name_adaptive_color: true
          card_mod:
            style: |
              .states--secondary {
                  font-size: 0px;
                    }
                ha-card .header.flex .name.flex { 
                  margin-top: 0px;
                  font-size: 14px;
                  margin-left: 0px;
                  font-weight: 500;
                  } 
                ha-card .states.flex {
                  margin-top: -60px;
                  margin-left: 120px;
                  margin-right: 0px;
                  font-weight: normal;
                  font-size: 10px;
                  }
                ha-card .graph .graph__container {
                  margin-top: -10px;
                  }
                ha-card .graph .graph__container .graph__labels span { 
                  font-size: 100%;
                  }
                ha-card .header.flex .icon {
                  --mdc-icon-size: 32px;
                  margin-top: 0px;
                  margin-right: 00px;
                  }
          grid_options:
            columns: 18
        - type: custom:mini-graph-card
          height: 120
          decimals: 1
          hour24: true
          lower_bound_secondary: 0
          upper_bound_secondary: 1
          entities:
            - entity: sensor.smarthrt_temperature_exterieure
              name: Température extérieure
              show_points: false
            - entity: sensor.smarthrt_temperature_ressentie
              color: "#ffffff"
              name: Température ressentie
              show_points: false
            - entity: sensor.smarthrt_etat_nuit
              color: "#424242"
              aggregate_func: Max
              show_state: false
              smoothing: false
              show_line: false
              show_points: false
              show_legend: false
              y_axis: secondary
          color_thresholds:
            - value: 30
              color: "#d50000"
            - value: 25
              color: "#ff5722"
            - value: 20
              color: "#ff9800"
            - value: 15
              color: "#ffc107"
            - value: 10
              color: "#4caf50"
            - value: 5
              color: "#2196f3"
            - value: 0
              color: "#1565c0"
            - value: -5
              color: "#0d47a1"
          line_width: 2
          name: Températures extérieures
          hours_to_show: 48
          points_per_hour: 12
          group_by: hour
          show:
            icon: true
            name: true
            fill: fade
            labels: true
            name_adaptive_color: true
            points: false
          card_mod:
            style: |
              .states--secondary {
                  font-size: 0px;
                    }
                ha-card .header.flex .name.flex { 
                  margin-top: 0px;
                  font-size: 14px;
                  margin-left: 0px;
                  font-weight: 500;
                  } 
                ha-card .states.flex {
                  margin-top: -60px;
                  margin-left: 120px;
                  margin-right: 0px;
                  font-weight: normal;
                  font-size: 10px;
                  }
                ha-card .graph .graph__container {
                  margin-top: -10px;
                  }
                ha-card .graph .graph__container .graph__labels span { 
                  font-size: 100%;
                  }
                ha-card .header.flex .icon {
                  --mdc-icon-size: 32px;
                  margin-top: 0px;
                  margin-right: 00px;
                  }
          grid_options:
            columns: 18
        - type: custom:mini-graph-card
          height: 120
          decimals: 1
          hour24: true
          lower_bound_secondary: 0
          upper_bound_secondary: 1
          entities:
            - entity: sensor.smarthrt_rcth
              name: RCth
              color: "#FF9800"
            - entity: sensor.smarthrt_rpth
              name: RPth
              color: "#E91E63"
            - entity: sensor.smarthrt_etat_nuit
              color: "#424242"
              aggregate_func: Max
              show_state: false
              smoothing: false
              show_line: false
              show_points: false
              show_legend: false
              y_axis: secondary
          line_width: 2
          name: Évolution coefficients thermiques
          hours_to_show: 72
          points_per_hour: 4
          group_by: hour
          show:
            icon: true
            name: true
            fill: fade
            labels: true
            name_adaptive_color: true
          grid_options:
            columns: 18
        - type: custom:mini-graph-card
          height: 120
          decimals: 1
          hour24: true
          entities:
            - entity: sensor.smarthrt_vitesse_du_vent
              name: Vitesse du vent
              show_points: false
          line_width: 2
          name: Vitesse du vent
          hours_to_show: 72
          points_per_hour: 12
          group_by: hour
          aggregate_func: avg
          show:
            graph: bar
            icon: true
            name: true
            fill: fade
            labels: true
            name_adaptive_color: true
            points: false
          grid_options:
            columns: 18
      column_span: 3
  cards: []
  dense_section_placement: true
