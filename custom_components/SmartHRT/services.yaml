# ═══════════════════════════════════════════════════════════════════════════
# SERVICES SIMPLIFIÉS (RECOMMANDÉS)
# ═══════════════════════════════════════════════════════════════════════════

start_heating_cycle:
  name: Démarrer Cycle Chauffage
  description: >
    Démarre un nouveau cycle de chauffage journalier. 
    Place la machine à états en mode HEATING_ON (chauffage actif).
    Utilisez ce service pour forcer le début d'un nouveau cycle.
  fields:
    entry_id:
      name: Entry ID
      description: >
        L'ID de l'instance SmartHRT (multi-instance). Si vous avez plusieurs instances, 
        spécifiez l'entry_id pour cibler une instance spécifique.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

stop_heating:
  name: Arrêter Chauffage
  description: >
    Arrête le chauffage et démarre la phase de surveillance nocturne.
    Active la détection du lag de température puis lance les calculs de relance.
    Transitions: HEATING_ON → DETECTING_LAG → MONITORING.
  fields:
    entry_id:
      name: Entry ID
      description: >
        L'ID de l'instance SmartHRT (multi-instance). Si vous avez plusieurs instances, 
        spécifiez l'entry_id pour cibler une instance spécifique.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

start_recovery:
  name: Démarrer Relance
  description: >
    Démarre la phase de relance du chauffage pour atteindre la température cible 
    à l'heure de réveil. Calcule automatiquement RCth et active le calcul de RPth.
    Transitions: MONITORING → RECOVERY → HEATING_PROCESS.
  fields:
    entry_id:
      name: Entry ID
      description: >
        L'ID de l'instance SmartHRT (multi-instance). Si vous avez plusieurs instances, 
        spécifiez l'entry_id pour cibler une instance spécifique.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

end_recovery:
  name: Terminer Relance
  description: >
    Termine la phase de relance (consigne atteinte ou heure cible atteinte).
    Calcule RPth et retourne en mode chauffage normal.
    Transition: HEATING_PROCESS → HEATING_ON.
  fields:
    entry_id:
      name: Entry ID
      description: >
        L'ID de l'instance SmartHRT (multi-instance). Si vous avez plusieurs instances, 
        spécifiez l'entry_id pour cibler une instance spécifique.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

get_state:
  name: Obtenir État
  description: >
    Retourne l'état actuel de la machine à états avec tous les détails 
    (températures, heures, coefficients thermiques, modes actifs).
    Utile pour le debug et la supervision.
  fields:
    entry_id:
      name: Entry ID
      description: >
        L'ID de l'instance SmartHRT (multi-instance). Si vous avez plusieurs instances, 
        spécifiez l'entry_id pour cibler une instance spécifique.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

# ═══════════════════════════════════════════════════════════════════════════
# SERVICES UTILITAIRES
# ═══════════════════════════════════════════════════════════════════════════

reset_learning:
  name: Réinitialiser Apprentissage
  description: >
    Réinitialise tous les coefficients thermiques appris (RCth, RPth et leurs 
    variantes vent) aux valeurs par défaut (50). Utilisez ce service si les 
    valeurs apprises sont devenues inexactes, par exemple après des modifications 
    de l'habitation ou de l'isolation.
  fields:
    entry_id:
      name: Entry ID
      description: >
        L'ID de l'instance SmartHRT (multi-instance). Si vous avez plusieurs instances, 
        spécifiez l'entry_id pour cibler une instance spécifique.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

trigger_calculation:
  name: Déclencher Calcul
  description: >
    Déclenche immédiatement un nouveau calcul de l'heure de relance.
    Utile après avoir modifié des paramètres pour voir l'effet immédiatement
    sans attendre le prochain calcul automatique.
  fields:
    entry_id:
      name: Entry ID
      description: >
        L'ID de l'instance SmartHRT (multi-instance). Si vous avez plusieurs instances,
        spécifiez l'entry_id pour cibler une instance spécifique.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

# ═══════════════════════════════════════════════════════════════════════════
# SERVICES RÉCUPÉRATION DE FRAÎCHEUR (COOL RECOVERY)
# ═══════════════════════════════════════════════════════════════════════════

start_cool_recovery:
  name: Démarrer Récupération Fraîcheur
  description: >
    Démarre manuellement la phase de refroidissement (clim on).
    Enregistre le snapshot de début et calcule RCcu.
    Transition: COOL_MONITORING → COOL_RECOVERY.
  fields:
    entry_id:
      name: Entry ID
      description: >
        L'ID de l'instance SmartHRT (multi-instance).
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

end_cool_recovery:
  name: Terminer Récupération Fraîcheur
  description: >
    Termine manuellement la phase de refroidissement (clim off).
    Calcule RPcu et retourne en mode COOL_IDLE.
    Transition: COOL_RECOVERY → COOL_IDLE.
  fields:
    entry_id:
      name: Entry ID
      description: >
        L'ID de l'instance SmartHRT (multi-instance).
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

reset_cool_learning:
  name: Réinitialiser Apprentissage Fraîcheur
  description: >
    Réinitialise tous les coefficients thermiques cool appris (RCcu, RPcu et leurs
    variantes vent) aux valeurs par défaut (50). Utilisez ce service si les
    valeurs apprises sont devenues inexactes.
  fields:
    entry_id:
      name: Entry ID
      description: >
        L'ID de l'instance SmartHRT (multi-instance).
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:
